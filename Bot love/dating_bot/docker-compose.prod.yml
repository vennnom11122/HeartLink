services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dating_bot
      POSTGRES_USER: dating
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating -d dating_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  bot:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dating:${POSTGRES_PASSWORD}@postgres:5432/dating_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "alembic upgrade head && python scripts/seed_cities.py && python -m app.main"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
